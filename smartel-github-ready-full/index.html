<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SMARTEL 신청서</title>
  <style>
    body{font-family:system-ui, -apple-system, Segoe UI, Roboto, Noto Sans, sans-serif; padding:16px;}
    .row{margin:8px 0;}
    label{display:block; font-weight:600; margin-bottom:4px;}
    input,select{padding:8px; width:100%; max-width:420px;}
    .actions{margin-top:16px; display:flex; gap:8px;}
    button{padding:10px 14px; cursor:pointer;}
  </style>
</head>
<body>
  <h1>SMARTEL 신청 (테스트 폼)</h1>
  <form id="form">
    <div class="row">
      <label>가입자명</label>
      <input name="subscriber" placeholder="홍길동">
    </div>
    <div class="row">
      <label>생년월일(YYYYMMDD)</label>
      <input name="birth">
    </div>
    <div class="row">
      <label>주소</label>
      <input name="addr">
    </div>
    <div class="actions">
      <button id="saveBtn" type="button">PDF 저장</button>
      <button id="printBtn" type="button">인쇄</button>
    </div>
  </form>
  <script src="pdf-client.js"></script>
</body>
</html>

# smartel/netlify.toml
[build]
  base = "smartel"            # 레포 루트 기준. UI의 Base와 동일.
  publish = "."               # Base(smartel) 폴더 자체를 퍼블리시
  functions = "netlify/functions"  # Base 기준 경로

[functions]
  node_bundler = "esbuild"
  # 함수 번들에 PDF/JSON 포함 (Base 기준 경로 사용!)
  included_files = ["pdf/**"]



